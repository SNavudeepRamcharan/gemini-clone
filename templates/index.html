<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar styling with toggle transitions */
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid #2d2f31;
            transition: transform 0.3s ease, width 0.3s ease;
            transform: translateX(0);
        }
        
        /* Class to hide sidebar */
        .sidebar.hidden {
            transform: translateX(-100%);
            width: 0;
            padding: 20px 0;
            overflow: hidden;
            border-right: none;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .brand-sparkle {
            color: #7baaf7;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #e3e3e3;
            padding: 12px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }
        .nav-btn:hover {
            background-color: #2d2f31;
        }
        .new-chat-btn {
            background-color: #2d2f31;
            border: none;
            color: #e3e3e3;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .new-chat-btn:hover {
            background-color: #3c4043;
        }
        .section-title {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            padding-left: 12px;
        }
        .history-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        /* Hide scrollbar line inside sidebar history list container */
        .history-container::-webkit-scrollbar {
            display: none;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccced1;
        }
        .history-item:hover {
            background-color: #2d2f31;
        }

        /* Main Window Layout */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background-color: #131314;
            position: relative;
        }
        
        /* Menu Toggle Button Style */
        .menu-toggle {
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 5px;
            border-radius: 5px;
        }
        .menu-toggle:hover {
            background-color: #2d2f31;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            max-width: 850px;
            width: 100%;
            margin: 40px auto 20px auto; /* Added top margin to clear the toggle button */
            padding-right: 15px;
            scrollbar-width: none; /* Hides scrollbar on Firefox */
        }
        
        /* FIXED: Hides the scrolling scrollbar line on Chrome, Safari, and Opera */
        .chat-box::-webkit-scrollbar {
            display: none;
        }

        .message-row {
            margin: 20px 0;
        }
        .sender-name {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .sender-next { color: #8ab4f8; }
        .sender-you { color: #e3e3e3; text-align: right; }
        .message-text {
            padding: 2px 0;
            font-size: 16px;
            line-height: 1.6;
            max-width: 85%;
            display: inline-block;
            word-wrap: break-word;
        }
        .user-row { text-align: right; }

        /* Clean Input Container layout */
        .input-bar-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .input-container {
            display: flex;
            align-items: center;
            background-color: #1e1f20;
            border-radius: 28px;
            padding: 6px 14px 6px 20px;
            gap: 15px;
        }
        #user-prompt {
            flex: 1;
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }
        
        /* Paperclip icon moved safely to the LEFT side of prompt box */
        .upload-label {
            font-size: 22px;
            cursor: pointer;
            color: #9aa0a6;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            padding-right: 5px;
        }
        .upload-label:hover { color: #8ab4f8; }
        #send-btn {
            background-color: #a8c7fa;
            color: #042100;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        #send-btn:hover { background-color: #c2e7ff; }
        #file-preview-name {
            color: #8ab4f8;
            font-size: 13px;
            margin-top: 8px;
            padding-left: 60px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar-menu">
        <div class="brand"><span class="brand-sparkle">✦</span> Next AI</div>
        
        <button class="new-chat-btn" onclick="startNewChat()">📝 New chat</button>
        
        <button class="nav-btn">🔍 Search chats</button>
        <button class="nav-btn">🖼️ Images</button>
        <button class="nav-btn">🎬 Videos</button>
        <button class="nav-btn">📂 Library</button>
        
        <div class="section-title">Recents</div>
        <div class="history-container" id="history-list"></div>
    </div>

    <div class="main-chat">
        <button class="menu-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>

        <div class="chat-box" id="chat-stream">
            <div class="message-row">
                <div class="sender-name sender-next">Next AI</div>
                <div class="message-text">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>
            </div>
        </div>

        <div class="input-bar-container">
            <div class="input-container">
                <label for="file-upload" class="upload-label" title="Upload image or document">📎</label>
                <input type="file" id="file-upload" name="file" accept="image/*, .pdf, .txt, .csv, .docx" style="display: none;" onchange="showSelectedFile()">
                
                <input type="text" id="user-prompt" placeholder="Enter a prompt here..." onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
            <div id="file-preview-name"></div>
        </div>
    </div>

    <script>
        let currentSessionId = "session_" + Math.random().toString(36).substring(2, 9);
        let activeSessionsList = JSON.parse(localStorage.getItem('device_sessions')) || [];

        if (!activeSessionsList.includes(currentSessionId)) {
            activeSessionsList.push(currentSessionId);
            localStorage.setItem('device_sessions', JSON.stringify(activeSessionsList));
        }

        updateSidebarHistory();

        // FIXED: Toggle Sidebar visibility function
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-menu');
            sidebar.classList.toggle('hidden');
        }

        // Cleans up Markdown layout formatting issues from Gemini API responses
        function formatAIResponse(text) {
            if (!text) return "";
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/^\*\s(.*)$/gm, '• $1');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        function showSelectedFile() {
            const fileInput = document.getElementById('file-upload');
            const previewName = document.getElementById('file-preview-name');
            if (fileInput && fileInput.files.length > 0) {
                previewName.innerText = "📄 Attached File: " + fileInput.files[0].name;
            } else if (previewName) {
                previewName.innerText = "";
            }
        }

        function startNewChat() {
            currentSessionId = "session_" + Math.random().toString(36).substring(2, 9);
            activeSessionsList.push(currentSessionId);
            localStorage.setItem('device_sessions', JSON.stringify(activeSessionsList));
            
            document.getElementById('chat-stream').innerHTML = `
                <div class="message-row">
                    <div class="sender-name sender-next">Next AI</div>
                    <div class="message-text">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>
                </div>
            `;
            document.getElementById('user-prompt').value = "";
            if(document.getElementById('file-upload')) document.getElementById('file-upload').value = "";
            if(document.getElementById('file-preview-name')) document.getElementById('file-preview-name').innerText = "";
            updateSidebarHistory();
        }

        function loadSession(sid) {
            currentSessionId = sid;
            const chatStream = document.getElementById('chat-stream');
            chatStream.innerHTML = `
                <div class="message-row">
                    <div class="sender-name sender-next">Next AI</div>
                    <div class="message-text" style="color: #aaa;">Syncing chat logs...</div>
                </div>
            `;
            
            const formData = new FormData();
            formData.append("message", "Provide a quick history refresher summary for this thread.");
            formData.append("session_id", sid);

            fetch('/api/chat', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                chatStream.innerHTML = "";
                if (data.response) {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name sender-next">Next AI</div>
                            <div class="message-text">${formatAIResponse(data.response)}</div>
                        </div>
                    `;
                } else {
                    chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text">Empty thread active. Type a message below!</div></div>`;
                }
                chatStream.scrollTop = chatStream.scrollHeight;
            })
            .catch(() => {
                chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text">Thread loaded. Continue typing below.</div></div>`;
            });
        }

        function updateSidebarHistory() {
            fetch('/api/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "session_ids": activeSessionsList })
            })
            .then(res => res.json())
            .then(data => {
                const historyList = document.getElementById('history-list');
                if (!historyList) return;
                historyList.innerHTML = "";
                if (data && data.length > 0) {
                    data.forEach(item => {
                        historyList.innerHTML += `
                            <div class="history-item" onclick="loadSession('${item.session_id}')" style="cursor: pointer;" title="${item.title}">
                                💬 ${item.title}
                            </div>
                        `;
                    });
                }
            }).catch(err => console.log("History sync active.", err));
        }

        function sendMessage() {
            const textInput = document.getElementById('user-prompt');
            const fileInput = document.getElementById('file-upload');
            const chatStream = document.getElementById('chat-stream');
            
            const message = textInput.value.trim();
            const hasFile = fileInput && fileInput.files.length > 0;
            
            if (!message && !hasFile) return;

            let userDisplay = message;
            if (hasFile) {
                userDisplay = (message ? message + "<br>" : "") + `<small style="color:#8ab4f8; font-weight:bold;">📎 Attached: ${fileInput.files[0].name}</small>`;
            }
            
            chatStream.innerHTML += `
                <div class="message-row user-row">
                    <div class="sender-name sender-you">You</div>
                    <div class="message-text">${userDisplay}</div>
                </div>
            `;
            chatStream.scrollTop = chatStream.scrollHeight;

            const formData = new FormData();
            formData.append("message", message);
            formData.append("session_id", currentSessionId);
            if (hasFile) {
                formData.append("file", fileInput.files[0]);
            }

            textInput.value = "";
            if(fileInput) fileInput.value = "";
            if(document.getElementById('file-preview-name')) document.getElementById('file-preview-name').innerText = "";

            fetch('/api/chat', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.response) {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name sender-next">Next AI</div>
                            <div class="message-text">${formatAIResponse(data.response)}</div>
                        </div>
                    `;
                } else {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name" style="color: red;">Error</div>
                            <div class="message-text">${data.error || 'Connection dropped.'}</div>
                        </div>
                    `;
                }
                chatStream.scrollTop = chatStream.scrollHeight;
                updateSidebarHistory(); 
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
