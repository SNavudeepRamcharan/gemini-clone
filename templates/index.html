<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar layout matching your minimal design profile */
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d2f31;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: width 0.3s ease, padding 0.3s ease, border 0.3s ease;
            overflow: hidden;
        }
        
        .sidebar.hidden {
            width: 0;
            padding: 20px 0;
            border-right: none;
        }

        /* Branding header typography styles */
        .brand {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 25px;
            color: #fff;
            white-space: nowrap;
        }
        .brand-sparkle { color: #7baaf7; }
        
        /* Centered button formatting specifications */
        .new-chat-btn {
            background-color: #2d2f31;
            border: none;
            color: #e3e3e3;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .new-chat-btn:hover { background-color: #3c4043; }
        
        /* Recents subtitle section typography layout */
        .section-title {
            font-size: 16px;
            color: #e3e3e3;
            margin-top: 5px;
            margin-bottom: 15px;
            white-space: nowrap;
        }
        
        .history-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-container::-webkit-scrollbar { display: none; }
        
        .history-item {
            padding: 4px 0;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccced1;
        }
        .history-item:hover { color: #fff; }

        /* Main Context Chat Workspace Pane */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background-color: #131314;
            height: 100vh;
            box-sizing: border-box;
            position: relative;
        }
        
        /* Fixed Toggle Handle button positioning alignment rules */
        .menu-toggle {
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 5px 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-toggle:hover { background-color: #2d2f31; }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            max-width: 850px;
            width: 100%;
            margin: 50px auto 20px auto; 
            padding-right: 5px;
            scrollbar-width: none; 
        }
        .chat-box::-webkit-scrollbar { display: none; }

        .message-row { margin: 25px 0; position: relative; }
        .sender-name { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .sender-next { color: #8ab4f8; }
        .sender-you { color: #e3e3e3; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        
        .message-text {
            font-size: 16px;
            line-height: 1.6;
            width: 100%;
            display: inline-block;
            word-wrap: break-word;
        }
        
        .edit-msg-btn {
            background: none;
            border: none;
            color: #8ab4f8;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            padding: 2px 6px;
        }
        .message-row:hover .edit-msg-btn { opacity: 1; }
        .user-row { text-align: right; }

        /* Foot Bar Core Entry container layouts */
        .input-bar-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .input-container {
            display: flex;
            align-items: center;
            background-color: #1e1f20;
            border-radius: 28px;
            padding: 6px 14px 6px 20px;
            gap: 15px;
        }
        #user-prompt {
            flex: 1;
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }
        
        .upload-label {
            font-size: 22px;
            cursor: pointer;
            color: #9aa0a6;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .upload-label:hover { color: #8ab4f8; }
        
        #send-btn {
            background-color: #a8c7fa;
            color: #042100;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        #send-btn:hover { background-color: #c2e7ff; }
        
        #file-preview-name {
            color: #8ab4f8;
            font-size: 13px;
            margin-top: 8px;
            padding-left: 40px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Sidebar Menu view box configuration -->
    <div class="sidebar" id="sidebar-menu">
        <div class="brand"><span class="brand-sparkle">✦</span> Next AI</div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        <div class="section-title">Recents</div>
        <div class="history-container" id="history-list"></div>
    </div>

    <!-- Main Workspace Application Window viewpane -->
    <div class="main-chat" id="main-chat-window">
        <!-- Structural Navigation burger options toggle handle link anchor -->
        <button class="menu-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>

        <div class="chat-box" id="chat-stream">
            <div class="message-row">
                <div class="sender-name sender-next">Next AI</div>
                <div class="message-text">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>
            </div>
        </div>

        <div class="input-bar-container">
            <div class="input-container">
                <label for="file-upload" class="upload-label" title="Upload image or document">📎</label>
                <input type="file" id="file-upload" name="file" accept="image/*, .pdf, .txt, .csv, .docx" style="display: none;" onchange="showSelectedFile()">
                
                <input type="text" id="user-prompt" placeholder="Enter a prompt here..." onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
            <div id="file-preview-name"></div>
        </div>
    </div>

    <script>
        let currentSessionId = "session_" + Math.random().toString(36).substring(2, 9);
        let activeSessionsList = JSON.parse(localStorage.getItem('device_sessions')) || [];

        if (!activeSessionsList.includes(currentSessionId)) {
            activeSessionsList.push(currentSessionId);
            localStorage.setItem('device_sessions', JSON.stringify(activeSessionsList));
        }

        updateSidebarHistory();

        // FIXED: Core responsive view pane calculation layout mechanics
        function toggleSidebar() {
            document.getElementById('sidebar-menu').classList.toggle('hidden');
        }

        function formatAIResponse(text) {
            if (!text) return "";
            let formatted = text.replace(/```(?:[a-zA-Z0-9_-]+)?([\s\S]*?)```/g, function(match, codeBody) {
                return '<pre style="background-color: #1e1f20; padding: 16px; border-radius: 12px; border: 1px solid #2d2f31; overflow-x: auto; font-family: \'Courier New\', Courier, monospace; font-size: 14px; text-align: left; color: #e3e3e3; margin: 15px 0; white-space: pre; max-width: 100%;">' + codeBody.trim() + '</pre>';
            });
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/^\*\s(.*)$/gm, '• $1');
            
            let segments = formatted.split(/(<pre[\s\S]*?<\/pre>)/);
            for (let i = 0; i < segments.length; i++) {
                if (!segments[i].startsWith('<pre')) {
                    segments[i] = segments[i].replace(/\n/g, '<br>');
                }
            }
            return segments.join('');
        }

        function showSelectedFile() {
            const fileInput = document.getElementById('file-upload');
            const previewName = document.getElementById('file-preview-name');
            if (fileInput && fileInput.files.length > 0) {
                previewName.innerText = "📄 Attached: " + fileInput.files[0].name;
            } else if (previewName) {
                previewName.innerText = "";
            }
        }

        function editPrompt(buttonElement) {
            const rawText = buttonElement.getAttribute('data-raw');
            document.getElementById('user-prompt').value = rawText;
            document.getElementById('user-prompt').focus();
        }

        function startNewChat() {
            currentSessionId = "session_" + Math.random().toString(36).substring(2, 9);
            activeSessionsList.push(currentSessionId);
            localStorage.setItem('device_sessions', JSON.stringify(activeSessionsList));
            
            document.getElementById('chat-stream').innerHTML = `
                <div class="message-row">
                    <div class="sender-name sender-next">Next AI</div>
                    <div class="message-text">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>
                </div>
            `;
            document.getElementById('user-prompt').value = "";
            if(document.getElementById('file-upload')) document.getElementById('file-upload').value = "";
            if(document.getElementById('file-preview-name')) document.getElementById('file-preview-name').innerText = "";
            updateSidebarHistory();
        }

        function loadSession(sid) {
            currentSessionId = sid;
            const chatStream = document.getElementById('chat-stream');
            chatStream.innerHTML = `
                <div class="message-row">
                    <div class="sender-name sender-next">Next AI</div>
                    <div class="message-text" style="color: #aaa;">Syncing chat logs...</div>
                </div>
            `;
            
            const formData = new FormData();
            formData.append("message", "Provide a quick history refresher summary for this thread.");
            formData.append("session_id", sid);

            fetch('/api/chat', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                chatStream.innerHTML = "";
                if (data.response) {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name sender-next">Next AI</div>
                            <div class="message-text">${formatAIResponse(data.response)}</div>
                        </div>
                    `;
                } else {
                    chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text">Empty thread active. Type a message below!</div></div>`;
                }
                chatStream.scrollTop = chatStream.scrollHeight;
            })
            .catch(() => {
                chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text">Thread loaded. Continue typing below.</div></div>`;
            });
        }

        function updateSidebarHistory() {
            fetch('/api/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "session_ids": activeSessionsList })
            })
            .then(res => res.json())
            .then(data => {
                const historyList = document.getElementById('history-list');
                if (!historyList) return;
                historyList.innerHTML = "";
                if (data && data.length > 0) {
                    data.forEach(item => {
                        historyList.innerHTML += `
                            <div class="history-item" onclick="loadSession('${item.session_id}')" style="cursor: pointer;" title="${item.title}">
                                💬 ${item.title}
                            </div>
                        `;
                    });
                }
            }).catch(err => console.log("History synchronized.", err));
        }

        function sendMessage() {
            const textInput = document.getElementById('user-prompt');
            const fileInput = document.getElementById('file-upload');
            const chatStream = document.getElementById('chat-stream');
            
            const message = textInput.value.trim();
            const hasFile = fileInput && fileInput.files.length > 0;
            
            if (!message && !hasFile) return;

            let userDisplay = message;
            if (hasFile) {
                userDisplay = (message ? message + "<br>" : "") + `<small style="color:#8ab4f8; font-weight:bold;">📎 Attached: ${fileInput.files[0].name}</small>`;
            }
            
            let safeString = message.replace(/"/g, '&quot;').replace(/'/g, '&#39;');

            chatStream.innerHTML += `
                <div class="message-row user-row">
                    <div class="sender-name sender-you">
                        <button class="edit-msg-btn" data-raw="${safeString}" onclick="editPrompt(this)">✏️ Edit</button> 
                        You
                    </div>
                    <div class="message-text">${userDisplay}</div>
                </div>
            `;
            chatStream.scrollTop = chatStream.scrollHeight;

            const formData = new FormData();
            formData.append("message", message);
            formData.append("session_id", currentSessionId);
            if (hasFile) {
                formData.append("file", fileInput.files[0]);
            }

            textInput.value = "";
            if(fileInput) fileInput.value = "";
            if(document.getElementById('file-preview-name')) document.getElementById('file-preview-name').innerText = "";

            fetch('/api/chat', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.response) {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name sender-next">Next AI</div>
                            <div class="message-text">${formatAIResponse(data.response)}</div>
                        </div>
                    `;
                } else {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name" style="color: red;">Error</div>
                            <div class="message-text">${data.error || 'Connection dropped.'}</div>
                        </div>
                    `;
                }
                chatStream.scrollTop = chatStream.scrollHeight;
                updateSidebarHistory(); 
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
