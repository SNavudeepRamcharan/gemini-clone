<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next AI Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #333;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        .message-row {
            margin: 15px 0;
        }
        .sender-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .sender-next { color: #8ab4f8; }
        .sender-you { color: #e3e3e3; text-align: right; }
        .message-text {
            background-color: #282a2d;
            padding: 12px;
            border-radius: 8px;
            max-width: 75%;
            display: inline-block;
            word-wrap: break-word;
        }
        .user-row { text-align: right; }
        .user-row .message-text { background-color: #333537; }
        
        /* Bottom Input Form Styling */
        .input-bar-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        .input-container {
            display: flex;
            align-items: center;
            background-color: #282a2d;
            border-radius: 28px;
            padding: 8px 16px;
            gap: 12px;
        }
        .upload-label {
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }
        .upload-label:hover { color: #8ab4f8; }
        #user-prompt {
            flex: 1;
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            outline: none;
        }
        #send-btn {
            background-color: #8ab4f8;
            color: #131314;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        #send-btn:hover { background-color: #aecbfa; }
        #file-preview-name {
            color: #8ab4f8;
            font-size: 13px;
            margin-top: 6px;
            padding-left: 40px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>✨ Next AI</h2>
        <button style="padding: 10px; border-radius: 8px; border: none; background: #333; color: #fff; cursor: pointer;">+ New Chat</button>
        <div style="margin-top: 20px; font-size: 14px; color: #aaa;">Recents</div>
        <div id="history-list"></div>
    </div>

    <div class="main-chat">
        <div class="chat-box" id="chat-stream">
            <div class="message-row">
                <div class="sender-name sender-next">Next AI</div>
                <div class="message-text">Hello! I am Next AI. Upload research files or images, or type a prompt below to get started.</div>
            </div>
        </div>

        <div class="input-bar-container">
            <div class="input-container">
                <label for="file-upload" class="upload-label" title="Upload image or document">📎</label>
                <input type="file" id="file-upload" name="file" accept="image/*, .pdf, .txt, .csv, .docx" style="display: none;" onchange="showSelectedFile()">
                
                <input type="text" id="user-prompt" placeholder="Enter a prompt here..." onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
            <div id="file-preview-name"></div>
        </div>
    </div>

    <script>
        // Track unique device context instances matching your backend structure rules
        const session_id = "session_" + Math.random().toString(36).substring(2, 9);

        function showSelectedFile() {
            const fileInput = document.getElementById('file-upload');
            const previewName = document.getElementById('file-preview-name');
            if (fileInput.files.length > 0) {
                previewName.innerText = "📄 Attached File: " + fileInput.files[0].name;
            } else {
                previewName.innerText = "";
            }
        }

        function sendMessage() {
            const textInput = document.getElementById('user-prompt');
            const fileInput = document.getElementById('file-upload');
            const chatStream = document.getElementById('chat-stream');
            
            const message = textInput.value.trim();
            const hasFile = fileInput.files.length > 0;
            
            if (!message && !hasFile) return;

            // Render user bubble immediately on UI stream
            let userDisplay = message;
            if (hasFile) {
                userDisplay = (message ? message + "<br>" : "") + `<small style="color:#8ab4f8;">📎 [File: ${fileInput.files[0].name}]</small>`;
            }
            
            chatStream.innerHTML += `
                <div class="message-row" style="text-align: right;">
                    <div class="sender-name sender-you">You</div>
                    <div class="message-text">${userDisplay}</div>
                </div>
            `;
            chatStream.scrollTop = chatStream.scrollHeight;

            // Package the stream structures into a FormData container object
            const formData = new FormData();
            formData.append("message", message);
            formData.append("session_id", session_id);
            if (hasFile) {
                formData.append("file", fileInput.files[0]);
            }

            // Clear layout input nodes immediately to prepare for subsequent streams
            textInput.value = "";
            fileInput.value = "";
            document.getElementById('file-preview-name').innerText = "";

            // POST transmission payload configurations
            fetch('/api/chat', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.response) {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name sender-next">Next AI</div>
                            <div class="message-text">${data.response.replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                } else {
                    chatStream.innerHTML += `
                        <div class="message-row">
                            <div class="sender-name" style="color: red;">Error</div>
                            <div class="message-text">${data.error || 'Something went wrong.'}</div>
                        </div>
                    `;
                }
                chatStream.scrollTop = chatStream.scrollHeight;
            })
            .catch(err => {
                console.error("Transmission breakdown:", err);
            });
        }
    </script>
</body>
</html>
