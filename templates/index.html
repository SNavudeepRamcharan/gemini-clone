<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d2f31;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: width 0.3s ease, padding 0.3s ease, border 0.3s ease;
            overflow: hidden;
        }
        
        .sidebar.hidden {
            width: 0;
            padding: 20px 0;
            border-right: none;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 25px;
            color: #fff;
            white-space: nowrap;
        }
        .brand-sparkle { color: #7baaf7; }
        
        .new-chat-btn {
            background-color: #2d2f31;
            border: none;
            color: #e3e3e3;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .new-chat-btn:hover { background-color: #3c4043; }
        
        .section-title {
            font-size: 16px;
            color: #e3e3e3;
            margin-top: 5px;
            margin-bottom: 15px;
            white-space: nowrap;
        }
        
        .history-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-container::-webkit-scrollbar { display: none; }
        
        .history-item-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            padding: 6px 8px;
            transition: background 0.2s;
        }
        .history-item-wrapper:hover {
            background-color: #2d2f31;
        }
        .history-item {
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccced1;
            flex: 1;
        }
        .history-item:hover { color: #fff; }
        
        .delete-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            display: none;
        }
        .history-item-wrapper:hover .delete-btn {
            display: block;
        }
        .delete-btn:hover { color: #f28b82; }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background-color: #131314;
            height: 100vh;
            box-sizing: border-box;
            position: relative;
        }
        
        .menu-toggle {
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 5px 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-toggle:hover { background-color: #2d2f31; }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            max-width: 850px;
            width: 100%;
            margin: 50px auto 20px auto; 
            padding-right: 5px;
            scrollbar-width: none; 
        }
        .chat-box::-webkit-scrollbar { display: none; }

        .message-row { margin: 25px 0; position: relative; }
        .sender-name { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .sender-next { color: #8ab4f8; }
        .sender-you { color: #e3e3e3; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        
        .message-text {
            font-size: 16px;
            line-height: 1.6;
            width: 100%;
            display: inline-block;
            word-wrap: break-word;
        }
        
        .edit-msg-btn {
            background: none;
            border: none;
            color: #8ab4f8;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            padding: 2px 6px;
        }
        .message-row:hover .edit-msg-btn { opacity: 1; }
        .user-row { text-align: right; }

        .input-bar-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .input-container {
            display: flex;
            align-items: center;
            background-color: #1e1f20;
            border-radius: 28px;
            padding: 6px 14px 6px 20px;
            gap: 15px;
        }
        #user-prompt {
            flex: 1;
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }
        
        .icon-label {
            font-size: 22px;
            cursor: pointer;
            color: #9aa0a6;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .icon-label:hover { color: #8ab4f8; }
        
        .recording-active {
            color: #f28b82 !important;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        #send-btn {
            background-color: #a8c7fa;
            color: #042100;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        #send-btn:hover { background-color: #c2e7ff; }
        
        #file-preview-name {
            color: #8ab4f8;
            font-size: 13px;
            margin-top: 8px;
            padding-left: 40px;
            font-weight: 500;
        }

        .matrix-table {
            margin: 12px 0;
            border-left: 2px solid #8ab4f8;
            border-right: 2px solid #8ab4f8;
            border-radius: 5px;
            padding: 0 6px;
            display: inline-table;
            vertical-align: middle;
            border-collapse: collapse;
            background-color: #1e1f20;
        }
        .matrix-table td {
            padding: 6px 12px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar-menu">
        <div class="brand"><span class="brand-sparkle">✦</span> Next AI</div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        <div class="section-title">Recents</div>
        <div class="history-container" id="history-list"></div>
    </div>

    <div class="main-chat" id="main-chat-window">
        <button class="menu-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>

        <div class="chat-box" id="chat-stream">
            <div class="message-row">
                <div class="sender-name sender-next">Next AI</div>
                <div class="message-text">Hello! I am Next AI. Enter a prompt below or click the mic to talk to me!</div>
            </div>
        </div>

        <div class="input-bar-container">
            <div class="input-container">
                <label for="file-upload" class="icon-label" title="Upload image or document">📎</label>
                <input type="file" id="file-upload" name="file" accept="image/*, .pdf, .txt, .csv, .docx" style="display: none;" onchange="showSelectedFile()">
                
                <span id="voice-mic-btn" class="icon-label" onclick="triggerVoiceInput()" title="Speak your question">🎙️</span>
                
                <input type="text" id="user-prompt" placeholder="Type an expert prompt or ask me to solve structures..." onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
            <div id="file-preview-name"></div>
        </div>
    </div>

    <script>
        let currentSessionId = localStorage.getItem('current_session_id') || "session_" + Math.random().toString(36).substring(2, 9);
        let activeSessionsMetadata = JSON.parse(localStorage.getItem('sessions_metadata')) || [];
        localStorage.setItem('current_session_id', currentSessionId);

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let voiceRecognizer = null;
        let isRecordingVoice = false;
        let voicePermissionGranted = false; 

        if (SpeechRecognition) {
            voiceRecognizer = new SpeechRecognition();
            voiceRecognizer.continuous = false;
            voiceRecognizer.lang = 'en-US';
            voiceRecognizer.interimResults = false;

            voiceRecognizer.onresult = function(event) {
                const textOutput = event.results[0][0].transcript;
                document.getElementById('user-prompt').value = textOutput;
                stopVoiceRecognition();
                voicePermissionGranted = true; 
                sendMessage(); 
            };

            voiceRecognizer.onerror = function() { stopVoiceRecognition(); };
            voiceRecognizer.onend = function() { stopVoiceRecognition(); };
        }

        syncActiveSessionViewOnBoot();

        function toggleSidebar() {
            document.getElementById('sidebar-menu').classList.toggle('hidden');
        }

        function triggerVoiceInput() {
            if (!voiceRecognizer) {
                alert("Voice features are not supported on this browser context.");
                return;
            }
            if (isRecordingVoice) {
                voiceRecognizer.stop();
                stopVoiceRecognition();
            } else {
                isRecordingVoice = true;
                document.getElementById('voice-mic-btn').classList.add('recording-active');
                voiceRecognizer.start();
            }
        }

        function stopVoiceRecognition() {
            isRecordingVoice = false;
            document.getElementById('voice-mic-btn').classList.remove('recording-active');
        }

        function speakTextAloud(textString) {
            if (voicePermissionGranted && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                let cleanText = textString.replace(/<\/?[^>]+(>|$)/g, "").replace(/•/g, "").trim();
                if(cleanText.length > 150) cleanText = cleanText.substring(0, 150) + "... Analysis complete.";
                
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
                voicePermissionGranted = false; 
            }
        }

        function formatAIResponse(text) {
            if (!text) return "";
            let formatted = text;

            // Robust multi-format matrix block scanner targeting standard matrix outputs
            const matrixRegex = /\\begin\{(pmatrix|matrix|bmatrix|array)\}([\s\S]*?)\\end\{\1\}/g;
            formatted = formatted.replace(matrixRegex, function(match, type, matrixBody) {
                let rows = matrixBody.trim().split(/\\\\/);
                let htmlTable = '<table class="matrix-table">';
                rows.forEach(row => {
                    let cleanedRow = row.replace(/^[^{]*\{[^{}]*\}/g, '').trim(); 
                    if(cleanedRow) {
                        htmlTable += '<tr>';
                        let columns = cleanedRow.split('&');
                        columns.forEach(col => {
                            let val = col.trim();
                            if(val) htmlTable += '<td>' + val + '</td>';
                        });
                        htmlTable += '</tr>';
                    }
                });
                htmlTable += '</table>';
                return htmlTable;
            });

            formatted = formatted.replace(/\$\$/g, '').replace(/\$/g, '');
            formatted = formatted.replace(/```(.*?)\n([\s\S]*?)```/g, function(match, lang, codeBody) {
                return '<pre style="background-color: #1e1f20; padding: 16px; border-radius: 12px; border: 1px solid #2d2f31; overflow-x: auto; font-family: monospace; font-size: 14px; text-align: left; color: #e3e3e3; margin: 15px 0; white-space: pre; max-width: 100%;">' + codeBody.trim() + '</pre>';
            });
            
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/^\*\s(.*)$/gm, '• $1');
            
            let segments = formatted.split(/(<pre[\s\S]*?<\/pre>)/);
            for (let i = 0; i < segments.length; i++) {
                if (!segments[i].startsWith('<pre')) {
                    segments[i] = segments[i].replace(/\n/g, '<br>');
                }
            }
            return segments.join('');
        }

        function showSelectedFile() {
            const fileInput = document.getElementById('file-upload');
            const previewName = document.getElementById('file-preview-name');
            if (fileInput && fileInput.files.length > 0) {
                previewName.innerText = "📄 Attached: " + fileInput.files[0].name;
            } else if (previewName) {
                previewName.innerText = "";
            }
        }

        function editPrompt(buttonElement) {
            document.getElementById('user-prompt').value = buttonElement.getAttribute('data-raw');
            document.getElementById('user-prompt').focus();
        }

        function startNewChat() {
            currentSessionId = "session_" + Math.random().toString(36).substring(2, 9);
            localStorage.setItem('current_session_id', currentSessionId);
            
            document.getElementById('chat-stream').innerHTML = `
                <div class="message-row">
                    <div class="sender-name sender-next">Next AI</div>
                    <div class="message-text">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>
                </div>
            `;
            document.getElementById('user-prompt').value = "";
            if(document.getElementById('file-upload')) document.getElementById('file-upload').value = "";
            if(document.getElementById('file-preview-name')) document.getElementById('file-preview-name').innerText = "";
            renderSidebarDOM();
        }

        function loadSession(sid) {
            currentSessionId = sid;
            localStorage.setItem('current_session_id', currentSessionId);
            const chatStream = document.getElementById('chat-stream');
            chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text" style="color: #aaa;">Syncing session history threads safely...</div></div>`;
            
            fetch('/api/load_session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "session_id": sid })
            })
            .then(res => res.json())
            .then(data => {
                chatStream.innerHTML = "";
                if(data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if(msg.role === 'user') {
                            let safeString = msg.text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                            chatStream.innerHTML += `
                                <div class="message-row user-row">
                                    <div class="sender-name sender-you"><button class="edit-msg-btn" data-raw="${safeString}" onclick="editPrompt(this)">✏️ Edit</button>You</div>
                                    <div class="message-text">${msg.text}</div>
                                </div>`;
                        } else {
                            chatStream.innerHTML += `
                                <div class="message-row">
                                    <div class="sender-name sender-next">Next AI</div>
                                    <div class="message-text">${formatAIResponse(msg.text)}</div>
                                </div>`;
                        }
                    });
                } else {
                    chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text">Empty thread loaded. Type a prompt below!</div></div>`;
                }
                chatStream.scrollTop = chatStream.scrollHeight;
            }).catch(() => {
                chatStream.innerHTML = `<div class="message-row"><div class="sender-name sender-next">Next AI</div><div class="message-text">Thread activated. Continue typing below!</div></div>`;
            });
        }

        function deleteSessionItem(event, sid) {
            event.stopPropagation(); 
            activeSessionsMetadata = activeSessionsMetadata.filter(item => item.session_id !== sid);
            localStorage.setItem('sessions_metadata', JSON.stringify(activeSessionsMetadata));
            if (currentSessionId === sid) {
                startNewChat();
            } else {
                renderSidebarDOM();
            }
        }

        function syncActiveSessionViewOnBoot() {
            renderSidebarDOM();
            if(activeSessionsMetadata.some(item => item.session_id === currentSessionId)) {
                loadSession(currentSessionId);
            }
        }

        function renderSidebarDOM() {
            const historyList = document.getElementById('history-list');
            if (!historyList) return;
            historyList.innerHTML = "";
            activeSessionsMetadata.forEach(item => {
                historyList.innerHTML += `
                    <div class="history-item-wrapper">
                        <div class="history-item" onclick="loadSession('${item.session_id}')" title="${item.title}">
                            💬 ${item.title}
                        </div>
                        <button class="delete-btn" onclick="deleteSessionItem(event, '${item.session_id}')" title="Delete thread">🗑️</button>
                    </div>
                `;
            });
        }

        function sendMessage() {
            const textInput = document.getElementById('user-prompt');
            const fileInput = document.getElementById('file-upload');
            const chatStream = document.getElementById('chat-stream');
            
            const message = textInput.value.trim();
            const hasFile = fileInput && fileInput.files.length > 0;
            
            if (!message && !hasFile) return;

            let userDisplay = message;
            if (hasFile) {
                userDisplay = (message ? message + "<br>" : "") + `<small style="color:#8ab4f8; font-weight:bold;">📎 Attached: ${fileInput.files[0].name}</small>`;
            }
            
            let safeString = message.replace(/"/g, '&quot;').replace(/'/g, '&#39;');

            chatStream.innerHTML += `
                <div class="message-row user-row">
                    <div class="sender-name sender-you">
                        <button class="edit-msg-btn" data-raw="${safeString}" onclick="editPrompt(this)">✏️ Edit</button> 
                        You
                    </div>
                    <div class="message-text">${userDisplay}</div>
                </div>
            `;
            
            const aiMessageRowId = "ai_" + Math.random().toString(36).substring(2, 9);
            chatStream.innerHTML += `
                <div class="message-row">
                    <div class="sender-name sender-next">Next AI</div>
                    <div class="message-text" id="${aiMessageRowId}">...</div>
                </div>
            `;
            chatStream.scrollTop = chatStream.scrollHeight;

            if (!activeSessionsMetadata.some(item => item.session_id === currentSessionId)) {
                let initialTitle = message ? (message.length <= 25 ? message : message.substring(0,22) + "...") : "File Analysis";
                activeSessionsMetadata.push({ "session_id": currentSessionId, "title": initialTitle });
                localStorage.setItem('sessions_metadata', JSON.stringify(activeSessionsMetadata));
            }

            const formData = new FormData();
            formData.append("message", message);
            formData.append("session_id", currentSessionId);
            if (hasFile) {
                formData.append("file", fileInput.files[0]);
            }

            textInput.value = "";
            if(fileInput) fileInput.value = "";
            if(document.getElementById('file-preview-name')) document.getElementById('file-preview-name').innerText = "";

            const aiResponseContainer = document.getElementById(aiMessageRowId);
            let fullAccumulatedText = "";

            fetch('/api/chat', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function readStreamChunk() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            renderSidebarDOM();
                            speakTextAloud(fullAccumulatedText); 
                            return;
                        }
                        const chunkStr = decoder.decode(value, { stream: true });
                        fullAccumulatedText += chunkStr;
                        aiResponseContainer.innerHTML = formatAIResponse(fullAccumulatedText);
                        chatStream.scrollTop = chatStream.scrollHeight;
                        return readStreamChunk();
                    });
                }
                return readStreamChunk();
            })
            .catch(err => {
                aiResponseContainer.innerHTML = `<span style="color:red;">Stream processing error: ${err}</span>`;
            });
        }
    </script>
</body>
</html>
