<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Sliding Sidebar Menu Dashboard matches screenshot specs exactly */
        .sidebar {
            width: 260px;
            background-color: #1e1f20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            z-index: 100;
            transition: transform 0.3s ease;
            transform: translateX(0);
            box-sizing: border-box;
        }
        
        .sidebar.hidden {
            transform: translateX(-100%);
        }

        /* Branding typography matching your layout screenshot */
        .brand {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 25px;
            color: #fff;
        }
        .brand-sparkle { color: #7baaf7; }
        
        /* Centered button format matching screen snippet */
        .new-chat-btn {
            background-color: #2d2f31;
            border: none;
            color: #e3e3e3;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .new-chat-btn:hover { background-color: #3c4043; }
        
        /* Section Recents header style */
        .section-title {
            font-size: 16px;
            color: #e3e3e3;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        
        .history-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-container::-webkit-scrollbar { display: none; }
        
        .history-item {
            padding: 4px 0;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccced1;
        }
        .history-item:hover { color: #fff; }

        /* Main Workspace Panel */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background-color: #131314;
            height: 100vh;
            box-sizing: border-box;
            margin-left: 260px; 
            transition: margin-left 0.3s ease;
        }
        
        .main-chat.full-width {
            margin-left: 0;
        }
        
        .menu-toggle {
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .menu-toggle:hover { background-color: #2d2f31; }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            max-width: 850px;
            width: 100%;
            margin: 50px auto 20px auto; 
            padding-right: 5px;
            scrollbar-width: none; 
        }
        .chat-box::-webkit-scrollbar { display: none; }

        .message-row { margin: 25px 0; position: relative; }
        .sender-name { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .sender-next { color: #8ab4f8; }
        .sender-you { color: #e3e3e3; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        
        .message-text {
            font-size: 16px;
            line-height: 1.6;
            width: 100%;
            display: inline-block;
            word-wrap: break-word;
        }
        
        .edit-msg-btn {
            background: none;
            border: none;
            color: #8ab4f8;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            padding: 2px 6px;
        }
        .message-row:hover .edit-msg-btn { opacity: 1; }
        .user-row { text-align: right; }

        /* Input Bar Layout */
        .input-bar-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .input-container {
            display: flex;
            align-items: center;
            background-color: #1e1f20;
            border-radius: 28px;
            padding: 6px 14px 6px 20px;
            gap: 15px;
        }
        #user-prompt {
            flex: 1;
            background: none;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }
        
        .upload-label {
            font-size: 22px;
            cursor: pointer;
            color: #9aa0a6;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .upload-label:hover { color: #8ab4f8; }
        
        #send-btn {
            background-color: #a8c7fa;
            color: #042100;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        #send-btn:hover { background-color: #c2e7ff; }
        
        #file-preview-name {
            color: #8ab4f8;
            font-size: 13px;
            margin-top: 8px;
            padding-left: 40px;
            font-weight: 500;
        }
    </style>
</head>

    <div class="sidebar" id="sidebar-menu">
        <div class="brand"><span class="brand-sparkle">✦</span> Next AI</div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        <div class="section-title">Recents</div>
        <div class="history-container" id="history-list"></div>
    </div>

    <div class="main-chat" id="main-chat-window">

        <div class="chat-box" id="chat-stream">

                <div class="sender-name sender-next">Next AI</div>
                <div class="message-text">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>

        </div>

        <div class="input-bar-container">
            <div class="input-container">
                <label for="file-upload" class="upload-label" title="Upload image or document">📎</label>

                <input type="text" id="user-prompt" placeholder="Enter a prompt here..." onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
            <div id="file-preview-name"></div>
        </div>
    </div>
