<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next AI Workspace</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #131314; color: #e3e3e3; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background-color: #1e1f20; display: flex; flex-direction: column; padding: 16px; border-right: 1px solid #282a2c; }
        .brand { font-size: 1.4rem; font-weight: 600; color: #fff; padding: 10px 8px; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .brand-sparkle { color: #7aa5f8; font-size: 1.5rem; }
        
        .side-btn { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 24px; font-size: 0.95rem; color: #e3e3e3; cursor: pointer; transition: background 0.2s; background: transparent; border: none; text-align: left; width: 100%; }
        .side-btn:hover { background-color: #2d2f31; }
        .new-chat-btn { background-color: #282a2c; margin-bottom: 16px; font-weight: 500; }
        .new-chat-btn:hover { background-color: #333537; }
        
        .section-title { font-size: 0.85rem; font-weight: 600; color: #9aa0a6; padding: 16px 12px 6px 12px; margin-top: 14px; }
        
        .recents-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
        .recent-item { padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; color: #e3e3e3; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-item:hover { background-color: #2d2f31; }
        .recent-item.active { background-color: #004a77; color: #c2e7ff; font-weight: 500; }

        .main-chat { flex: 1; display: flex; flex-direction: column; background-color: #131314; height: 100vh; }
        .chat-messages { flex: 1; padding: 40px 18% 20px 18%; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; }
        
        .message-wrapper { display: flex; flex-direction: column; }
        .sender-label { font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; }
        .user-wrapper .sender-label { color: #8ab4f8; align-self: flex-end; }
        .ai-wrapper .sender-label { color: #c4eed0; align-self: flex-start; }
        
        .message { max-width: 85%; padding: 12px 18px; border-radius: 16px; line-height: 1.6; font-size: 1rem; word-break: break-word; }
        .user-message { background: #282a2c; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-message { background: transparent; color: #e3e3e3; align-self: flex-start; padding-left: 0; }
        
        .chat-input-container { padding: 10px 18% 35px 18%; background: #131314; }
        .chat-input-area { background: #1e1f20; border-radius: 30px; display: flex; align-items: center; padding: 8px 20px; }
        
        input[type="text"] { flex: 1; padding: 10px; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; }
        input[type="text"]::placeholder { color: #80868b; }
        
        button { background: #8ab4f8; color: #042100; border: none; padding: 10px 22px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #aecbfa; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><span class="brand-sparkle">✦</span> Next AI</div>
        
        <button class="side-btn new-chat-btn" onclick="startNewChat()">📝 New chat</button>
        <button class="side-btn" onclick="switchFeature('Search Engine', 'Looking for something? Ask me to look up information across your previous chats.', 'Search your chats...')">🔍 Search chats</button>
        <button class="side-btn" onclick="switchFeature('Image Studio', 'Welcome to the Image Studio. Tell me what visual concepts you want to discuss.', 'Describe an image scene...')">🖼️ Images</button>
        <button class="side-btn" onclick="switchFeature('Video Center', 'Welcome to the Video Center. Let\'s script or plan out video modules.', 'Enter video topic...')">🎥 Videos</button>
        <button class="side-btn" onclick="switchFeature('Knowledge Library', 'Welcome to your library assistant. Ask me to find documentation insights.', 'Search resources...')">🗂️ Library</button>
        
        <div class="section-title">Recents</div>
        <div class="recents-list" id="recents-box"></div>
    </div>

    <div class="main-chat">
        <div class="chat-messages" id="chat-box">
            <div class="message-wrapper ai-wrapper">
                <div class="sender-label">Next AI</div>
                <div class="message ai-message">Hello! I am Next AI. Enter a prompt below to start a new history record thread.</div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Enter a prompt here..." autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

<script>
    let sessionId = "session_" + Math.random().toString(36).substring(2, 9);
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const recentsBox = document.getElementById('recents-box');

    userInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") { sendMessage(); }
    });

    // Device-specific localStorage integration layer
    let mySessions = JSON.parse(localStorage.getItem('next_ai_sessions') || '[]');

    loadSidebarHistory();

    function trackSessionLocally(id) {
        if (!mySessions.includes(id)) {
            mySessions.push(id);
            localStorage.setItem('next_ai_sessions', JSON.stringify(mySessions));
        }
    }

    function startNewChat() {
        sessionId = "session_" + Math.random().toString(36).substring(2, 9);
        userInput.placeholder = "Enter a prompt here...";
        chatBox.innerHTML = `
            <div class="message-wrapper ai-wrapper">
                <div class="sender-label">Next AI</div>
                <div class="message ai-message">Started a fresh conversation workspace. Your next message will create a history log.</div>
            </div>`;
        loadSidebarHistory();
    }

    function switchFeature(featureName, greetingText, placeholderText) {
        sessionId = "feature_" + featureName.toLowerCase().replace(" ", "_") + "_" + Math.random().toString(36).substring(2, 6);
        userInput.placeholder = placeholderText;
        chatBox.innerHTML = `
            <div class="message-wrapper ai-wrapper">
                <div class="sender-label">Next AI [${featureName}]</div>
                <div class="message ai-message">${greetingText}</div>
            </div>`;
        loadSidebarHistory();
    }

    async function loadSidebarHistory() {
        try {
            // Send only this browser's tracked session array list to the server lookup endpoint
            const res = await fetch('/api/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_ids: mySessions })
            });
            const historyList = await res.json();
            recentsBox.innerHTML = '';
            
            historyList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'recent-item';
                if (item.session_id === sessionId) div.className += ' active';
                div.innerText = item.title;
                recentsBox.appendChild(div);
            });
        } catch (e) {
            console.error("Failed to fetch sidebar history logs safely.");
        }
    }

    async function sendMessage() {
        const messageText = userInput.value.trim();
        if (!messageText) return;

        appendMessage(messageText, 'user', 'user-message');
        userInput.value = '';

        const loadingWrapper = appendMessage('Thinking...', 'ai', 'ai-message');
        const textNode = loadingWrapper.querySelector('.message');

        // Log this session id to localStorage before sending the message packet
        trackSessionLocally(sessionId);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText, session_id: sessionId })
            });
            const data = await response.json();
            
            if (data.response) {
                textNode.innerText = data.response;
                loadSidebarHistory();
            } else {
                textNode.innerText = "Error: " + data.error;
            }
        } catch (error) {
            textNode.innerText = "Connection lost with backend server.";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendMessage(text, sender, bubbleClass) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${sender}-wrapper`;
        
        const label = document.createElement('div');
        label.className = 'sender-label';
        label.innerText = sender === 'user' ? 'You' : 'Next AI';
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${bubbleClass}`;
        msgDiv.innerText = text;
        
        wrapper.appendChild(label);
        wrapper.appendChild(msgDiv);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
        return wrapper;
    }
</script>
</body>
</html>
